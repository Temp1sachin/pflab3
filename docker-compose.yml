services:
  db:
    image: mysql:8.0
    container_name: todo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: todo_app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/setup.sql:/docker-entrypoint-initdb.d/setup.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: todo_server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5001
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: todo_app
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "5001:5001"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: todo_client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      REACT_APP_API_URL: http://localhost:5001
    ports:
      - "3000:3000"
    stdin_open: true

volumes:
  mysql_data:
